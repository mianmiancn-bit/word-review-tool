<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词/词组复习工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            /* 蓝色渐变背景 */
            background: linear-gradient(135deg, #e0f7fa 0%, #bbdefb 50%, #90caf9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        .container {
            /* 磨砂玻璃效果 */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 135, 241, 0.15);
            padding: 50px 40px;
            width: 100%;
            max-width: 650px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #1976d2;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .header p {
            color: #4299e1;
            font-size: 18px;
            opacity: 0.8;
        }

        .word-card {
            /* 卡片渐变边框 */
            position: relative;
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            margin-bottom: 40px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .word-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid transparent;
            border-radius: 16px;
            background: linear-gradient(135deg, #1976d2, #64b5f6) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .word {
            font-size: 36px;
            font-weight: 600;
            color: #0d47a1;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .meaning {
            font-size: 26px;
            color: #1976d2;
            min-height: 50px;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            font-weight: 400;
        }

        .meaning.show {
            opacity: 1;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            color: white; /* 统一按钮文字为白色 */
        }

        /* 按钮hover动效 */
        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        button:hover::after {
            left: 100%;
        }

        /* 三个按钮统一蓝色系，从深到浅渐变 */
        #toggleMeaning {
            /* 最深的蓝色渐变 */
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
        }

        #toggleMeaning:hover {
            background: linear-gradient(135deg, #0a3d8c 0%, #1058a8 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(13, 71, 161, 0.3);
        }

        #nextWord {
            /* 中等深度蓝色渐变 */
            background: linear-gradient(135deg, #1976d2 0%, #2196f3 100%);
        }

        #nextWord:hover {
            background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3);
        }

        #mastered {
            /* 最浅的蓝色渐变 */
            background: linear-gradient(135deg, #42a5f5 0%, #64b5f6 100%);
        }

        #mastered:hover {
            background: linear-gradient(135deg, #3897ea 0%, #57a7e8 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.3);
        }

        .stats {
            text-align: center;
            background: rgba(207, 226, 250, 0.5);
            padding: 15px;
            border-radius: 10px;
            color: #0d47a1;
            font-size: 19px;
            font-weight: 500;
        }

        .stats span {
            color: #1976d2;
            font-weight: 600;
        }

        .footer {
            margin-top: 50px;
            color: #1976d2;
            font-size: 15px;
            text-align: center;
            opacity: 0.7;
        }

        /* 响应式适配 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 26px;
            }
            .word {
                font-size: 30px;
            }
            .meaning {
                font-size: 22px;
            }
            button {
                padding: 12px 24px;
                font-size: 15px;
            }
            .word-card {
                padding: 30px 20px;
                min-height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

    </div>

        // 状态管理
        let remainingWords = [...wordList]; // 待复习的单词
        let masteredWords = []; // 已掌握的单词
        let currentIndex = -1; // 当前显示的单词索引
        let currentWordObj = null; // 当前显示的单词对象

        // DOM 元素
        const currentWordEl = document.getElementById('currentWord');
        const currentMeaningEl = document.getElementById('currentMeaning');
        const toggleMeaningBtn = document.getElementById('toggleMeaning');
        const nextWordBtn = document.getElementById('nextWord');
        const masteredBtn = document.getElementById('mastered');
        const remainingCountEl = document.getElementById('remainingCount');
        const masteredCountEl = document.getElementById('masteredCount');

        // 初始化：显示第一个单词
        function init() {
            updateStats();
            showRandomWord();
        }

        // 显示随机单词（强制隐藏释义）
        function showRandomWord() {
            if (remainingWords.length === 0) {
                currentWordEl.textContent = "恭喜！所有单词已掌握";
                currentMeaningEl.textContent = "";
                currentMeaningEl.classList.remove('show'); // 确保清空时也隐藏
                return;
            }

            // 随机选一个未复习的单词
            currentIndex = Math.floor(Math.random() * remainingWords.length);
            currentWordObj = remainingWords[currentIndex];
            
            // 显示单词，强制移除show类隐藏释义
            currentWordEl.textContent = currentWordObj.word;
            currentMeaningEl.textContent = currentWordObj.meaning;
            currentMeaningEl.classList.remove('show'); // 核心修复：切换单词时强制隐藏释义
        }

        // 切换释义显示/隐藏
        function toggleMeaning() {
            currentMeaningEl.classList.toggle('show');
        }

        // 标记为已掌握
        function markAsMastered() {
            if (remainingWords.length === 0 || currentIndex === -1) return;
            
            // 移到已掌握列表
            const masteredWord = remainingWords.splice(currentIndex, 1)[0];
            masteredWords.push(masteredWord);
            
            // 更新统计，显示下一个（自动隐藏释义）
            updateStats();
            showRandomWord();
        }

        // 更新统计数据
        function updateStats() {
            remainingCountEl.textContent = remainingWords.length;
            masteredCountEl.textContent = masteredWords.length;
        }

        // 绑定事件
        toggleMeaningBtn.addEventListener('click', toggleMeaning);
        nextWordBtn.addEventListener('click', showRandomWord);
        masteredBtn.addEventListener('click', markAsMastered);

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
